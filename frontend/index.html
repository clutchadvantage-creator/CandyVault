<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/candyvault.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f141b" />
    <meta name="description" content="CandyVault — Personal Data & Document Hub" />
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("candyvault-theme");
          const theme = savedTheme === "forest" ? "forest" : "candy";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = "light";
        } catch {
          document.documentElement.dataset.theme = "candy";
        }
      })();
    </script>
    <title>CandyVault | Personal Data &amp; Document Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
